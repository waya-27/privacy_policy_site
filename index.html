    <!-- hovvyのスタイルをベースにする -->
    <link rel="stylesheet" href="../hovvy/style.css">
    <style>
        /* 追加スタイル */
        body {
            padding-top: 80px; /* 固定ヘッダーの分 */
            background-color: var(--light-bg);
        }
        
        .page-header {
            text-align: center;
            padding: 40px 0;
        }

        .privacy-container {
            max-width: 800px; /* 少し幅を狭める */
            margin: 0 auto 60px;
            padding: 0 20px;
        }

        .policy-list {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            overflow: hidden;
        }

        .policy-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 30px;
            border-bottom: 1px solid #f0f0f0;
            transition: background-color 0.2s;
        }

        .policy-item:last-child {
            border-bottom: none;
        }

        .policy-item:hover {
            background-color: #fafafa;
        }

        .app-info-row {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .app-icon-small {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            object-fit: cover;
            border: 1px solid #eee;
        }

        .app-name-row {
            font-weight: bold;
            font-size: 1.1rem;
            color: var(--text-color);
        }

        .policy-links {
            display: flex;
            gap: 20px;
        }

        .policy-link {
            font-size: 0.9rem;
            color: #666;
            text-decoration: none;
            padding: 6px 16px;
            border-radius: 20px;
            background-color: #f5f5f5;
            transition: all 0.2s;
        }

        .policy-link:hover {
            background-color: var(--primary-color);
            color: white;
        }

        @media (max-width: 600px) {
            .policy-item {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            .policy-links {
                width: 100%;
                justify-content: flex-start;
            }
        }
    </style>
